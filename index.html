<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#4b0082,#6a0dad,#8e44ad);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.2);
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:linear-gradient(135deg,#FFD700,#FFA500);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:700;
color:#fff;
}

h1{
color:#fff;
margin-top:15px;
font-size:32px;
}

.tagline{
color:#e8e8e8;
font-size:14px;
margin-top:5px;
margin-bottom:25px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
text-decoration:none;
padding:16px;
margin:12px 0;
border-radius:16px;
font-size:17px;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.phonepe{
background:#ffffff;
color:#5f259f;
}

.whatsapp{
background:#25D366;
color:#fff;
}

.call{
background:#2196F3;
color:#fff;
}

.footer{
margin-top:20px;
color:#fff;
font-size:15px;
}

.number{
font-weight:700;
font-size:18px;
}

.note{
margin-top:10px;
font-size:12px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">HS</div>

<h1>HAPPY SHOP</h1>

<div class="tagline">
Gift & General Store
</div>

<a class="btn phonepe"
href="upi://pay?pa=shaikhsufiyan@ybl&pn=Happy Shop">
💳 Pay with PhonePe
</a>

<a class="btn whatsapp"
href="https://wa.me/918080605200">
💬 WhatsApp Chat
</a>

<a class="btn call"
href="tel:+918080605200">
📞 Call Now
</a>

<div class="footer">
<div class="number">8080605200</div>
<div class="note">Thank You For Visiting ❤️</div>
</div>

</div>

</body>
</html>
