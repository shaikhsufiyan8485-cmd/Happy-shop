<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#000000,#111827,#1f2937);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:rgba(255,215,0,.08);
border-radius:50%;
filter:blur(120px);
top:-150px;
right:-100px;
}

body::after{
content:'';
position:fixed;
width:400px;
height:400px;
background:rgba(255,215,0,.05);
border-radius:50%;
filter:blur(100px);
bottom:-150px;
left:-100px;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,215,0,.25);
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:0 0 40px rgba(255,215,0,.15);
position:relative;
z-index:2;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

.card::after{
content:'';
position:absolute;
inset:0;
border-radius:30px;
border:1px solid rgba(255,215,0,.15);
pointer-events:none;
}

.logo img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
background:#fff;
padding:6px;
box-shadow:0 0 30px rgba(255,215,0,.8);
}

h1{
color:#FFD700;
font-size:34px;
margin-top:15px;
font-weight:700;
}

.tagline{
color:#ddd;
font-size:14px;
letter-spacing:2px;
margin-top:8px;
margin-bottom:15px;
}

.badge{
display:inline-block;
background:linear-gradient(45deg,#FFD700,#ffae00);
color:#000;
padding:8px 18px;
border-radius:30px;
font-size:13px;
font-weight:700;
margin-bottom:18px;
box-shadow:0 0 15px rgba(255,215,0,.5);
}

.info-box{
background:rgba(255,255,255,.08);
padding:14px;
border-radius:15px;
color:#fff;
font-size:14px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,.1);
}

.goldline{
height:2px;
background:linear-gradient(to right,transparent,#FFD700,transparent);
margin:18px 0;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
padding:17px;
margin:14px 0;
border-radius:18px;
font-size:18px;
font-weight:600;
color:#fff;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.btn:hover{
transform:translateY(-3px);
}

.phonepe{
background:#5f259f;
}

.phonepe:hover{
box-shadow:0 0 25px #5f259f;
}

.whatsapp{
background:#25D366;
}

.whatsapp:hover{
box-shadow:0 0 25px #25D366;
}

.call{
background:#f59e0b;
color:#000;
}

.call:hover{
box-shadow:0 0 25px #f59e0b;
}

.store-info{
margin-top:18px;
padding:15px;
background:rgba(255,255,255,.05);
border-radius:15px;
color:#fff;
font-size:14px;
line-height:1.8;
border:1px solid rgba(255,215,0,.15);
}

.footer{
margin-top:20px;
font-size:13px;
color:#ccc;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="file_000000001ad871fa9ff3c7f87fbb34aa.png" alt="Happy Shop Logo">
</div>

<h1>Happy Shop</h1>

<div class="tagline">
GIFT & GENERAL STORE
</div>

<div class="info-box">
🎁 Gifts • Toys • Keychains • General Items
</div>

<div class="goldline"></div>

<a class="btn phonepe" href="upi://pay?pa=8080605200@axl">
💜 PhonePe Payment
</a>

<a class="btn whatsapp" href="https://wa.me/918888919139">
💬 WhatsApp Chat
</a>

<a class="btn call" href="tel:+918888919139">
📞 Call Now
</a>

<div class="goldline"></div>

<div class="footer">
✨ Thank You For Visiting Happy Shop ✨
</div>

</div>

</body>
</html>
